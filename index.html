<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Popol Vuh — Knowledge Graph Explorer</title>
  <meta name="description" content="An interactive graph for discovering the people, places, and themes of the Popol Vuh." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
      --accent: #e63946; --bg: #0f1117; --panel: #171a23; --panel-2: #1e222e;
      --ink: #e7e9ee; --muted: #9aa3b2; --line: #2a2f3d; --sidebar-frac: 33.333%;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; overflow: hidden; }

    /* Desktop: info bar left 1/3, graph right 2/3 */
    #app { display: flex; flex-direction: row; height: 100vh; width: 100vw; }
    #sidebar { flex: 0 0 var(--sidebar-frac); max-width: var(--sidebar-frac); height: 100%;
      overflow-y: auto; background: var(--panel); border-right: 1px solid var(--line); padding: 1rem 1.1rem 3rem; }
    #graph-pane { flex: 1 1 auto; position: relative; min-width: 0;
      background: radial-gradient(circle at 60% 40%, #141826 0%, #0c0e14 100%); }
    #graph-svg { width: 100%; height: 100%; display: block; cursor: grab; }
    #graph-svg:active { cursor: grabbing; }

    /* Mobile: graph on top, info bar docked at bottom (~1/3 height) */
    @media (max-width: 768px) {
      #app { flex-direction: column; }
      #graph-pane { order: -1; flex: 1 1 62%; height: 62%; }
      #sidebar { flex: 0 0 38%; max-width: 100%; width: 100%; height: 38%;
        border-right: none; border-top: 1px solid var(--line); padding: 0.75rem 0.9rem 2rem; }
    }

    .link { stroke: #5b6577; stroke-opacity: 0.3; }
    .node circle { stroke: #0b0d12; stroke-width: 1.5px; cursor: pointer; transition: opacity .18s ease; }
    .node circle.focus { stroke: #fff; stroke-width: 2.5px; }
    .node text { fill: var(--ink); font-size: 10px; pointer-events: none; paint-order: stroke;
      stroke: #0b0d12; stroke-width: 3px; stroke-linejoin: round; }

    #graph-controls { position: absolute; top: 12px; right: 12px; display: flex; gap: .4rem; z-index: 5; }
    #graph-controls button { background: rgba(23,26,35,.85); color: var(--ink); border: 1px solid var(--line);
      border-radius: 6px; padding: .3rem .6rem; font-size: .8rem; cursor: pointer; }
    #graph-controls button:hover { background: var(--panel-2); }
    #legend { position: absolute; left: 12px; bottom: 12px; font-size: .72rem; color: var(--muted);
      background: rgba(15,17,23,.7); border: 1px solid var(--line); border-radius: 6px; padding: .4rem .6rem; max-width: 60%; }
    #legend .swatch { display:inline-block; width:.7rem; height:.7rem; border-radius:50%; margin-right:.3rem; vertical-align:middle; }

    .sb-title { font-size: 1.05rem; font-weight: 700; margin: 0 0 .15rem; }
    .sb-sub { color: var(--muted); font-size: .8rem; margin-bottom: .9rem; }
    .search-wrap { position: relative; margin-bottom: 1rem; }
    #search { width: 100%; background: var(--panel-2); border: 1px solid var(--line); color: var(--ink);
      border-radius: 7px; padding: .5rem .7rem; font-size: .85rem; }
    #search-results { margin-top: .35rem; display: none; max-height: 220px; overflow-y: auto;
      border: 1px solid var(--line); border-radius: 7px; background: var(--panel-2); }
    #search-results .res { padding: .4rem .6rem; cursor: pointer; font-size: .82rem; border-bottom: 1px solid var(--line); }
    #search-results .res:last-child { border-bottom: none; }
    #search-results .res:hover { background: #283047; }
    #search-results .res small { color: var(--muted); }

    .depth-card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px; padding: .7rem .8rem; margin-bottom: 1rem; }
    .depth-card label { font-size: .8rem; color: var(--muted); display:flex; justify-content:space-between; }
    .depth-val { color: var(--accent); font-weight: 700; }

    .focus-head { border-left: 3px solid var(--accent); padding-left: .7rem; margin-bottom: 1rem; }
    .focus-head h2 { font-size: 1.15rem; margin: 0 0 .35rem; }
    .focus-head .desc { font-size: .86rem; color: #c8cdd8; line-height: 1.45; }
    .badge-type, .badge-chapter { display: inline-block; font-size: .68rem; text-transform: uppercase;
      letter-spacing: .03em; padding: .12rem .45rem; border-radius: 5px; margin-right: .3rem; }
    .badge-type { background: #2c3650; color: #b9c6e6; }
    .badge-chapter { background: #3a2a2c; color: #e6b9bd; }

    .depth-group-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted);
      margin: 1rem 0 .5rem; border-bottom: 1px solid var(--line); padding-bottom: .25rem; }
    .dir-label { font-size:.7rem; color: var(--muted); margin:.4rem 0 .25rem; }
    .conn { border: 1px solid var(--line); border-radius: 8px; padding: .55rem .65rem; margin-bottom: .5rem;
      background: var(--panel); cursor: pointer; transition: border-color .15s, background .15s; }
    .conn:hover { border-color: var(--accent); background: var(--panel-2); }
    .conn .rel { font-size: .7rem; text-transform: uppercase; letter-spacing: .03em; color: #f4a261; }
    .conn .arrow-i { color: var(--muted); }
    .conn .target-label { font-weight: 600; font-size: .9rem; }
    .conn .edge-desc { font-size: .8rem; color: #c2c8d4; margin-top: .25rem; line-height: 1.4; }
    .conn .evidence { font-size: .76rem; color: var(--muted); font-style: italic; margin-top: .3rem;
      border-left: 2px solid var(--line); padding-left: .5rem; }
    .conn .wt { float: right; font-size: .7rem; color: var(--muted); }
    .deep-item { display: flex; align-items: baseline; gap: .4rem; padding: .3rem .4rem; border-radius: 6px; cursor: pointer; font-size: .83rem; }
    .deep-item:hover { background: var(--panel-2); }
    .deep-item .via { font-size: .7rem; color: #f4a261; white-space: nowrap; }

    .intro p { font-size: .85rem; color: #c2c8d4; line-height: 1.5; }
    .intro ul { font-size: .83rem; color: #c2c8d4; padding-left: 1.1rem; line-height: 1.5; }
    .stat-row { display:flex; gap:.5rem; margin:.8rem 0; }
    .stat { flex:1; background: var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:.5rem; text-align:center; }
    .stat .n { font-size:1.2rem; font-weight:700; color: var(--accent); }
    .stat .l { font-size:.68rem; color: var(--muted); text-transform:uppercase; }
    .loading { padding: 2rem; color: var(--muted); }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sb-title">Popol Vuh — Graph Explorer</div>
      <div class="sb-sub">Click a node to reveal its neighbourhood. Use the depth control to reach further.</div>
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Search a deity, hero, place, theme…" autocomplete="off" />
        <div id="search-results"></div>
      </div>
      <div class="depth-card">
        <label for="depth-range">
          <span>Traversal depth</span>
          <span><span class="depth-val" id="depth-val">2</span> hop(s)</span>
        </label>
        <input id="depth-range" type="range" min="1" max="4" step="1" value="2" class="form-range" />
      </div>
      <div id="sidebar-body"><div class="loading">Loading graph…</div></div>
    </aside>
    <main id="graph-pane">
      <div id="graph-controls">
        <button id="btn-reset" title="Show the full graph">Full graph</button>
        <button id="btn-zoom-fit" title="Fit graph to view">Fit</button>
      </div>
      <svg id="graph-svg"></svg>
      <div id="legend">
        <span class="swatch" style="background:#e63946"></span>focus
        <span class="swatch" style="background:#f4a261; margin-left:.6rem"></span>near
        <span class="swatch" style="background:#94a3b8; margin-left:.6rem"></span>far
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script>
  /* Chapter graph files to load and merge into one graph. Add new files here
     as more chapters are authored. */
  const GRAPH_FILES = [
    "graph/Part1_Ch01.json", "graph/Part1_Ch02.json", "graph/Part1_Ch03.json",
    "graph/Part1_Ch04.json", "graph/Part1_Ch05.json", "graph/Part1_Ch06.json",
    "graph/Part1_Ch07.json", "graph/Part1_Ch08.json", "graph/Part1_Ch09.json",
    "graph/Part2_Ch01.json", "graph/Part2_Ch02.json", "graph/Part2_Ch03.json",
    "graph/Part2_Ch04.json", "graph/Part2_Ch05.json", "graph/Part2_Ch06.json",
    "graph/Part2_Ch07.json", "graph/Part2_Ch08.json", "graph/Part2_Ch09.json",
    "graph/Part2_Ch10.json"
  ];

  async function loadGraph() {
    const files = await Promise.all(GRAPH_FILES.map(async (f) => {
      const r = await fetch(f);
      if (!r.ok) throw new Error(`${f}: HTTP ${r.status}`);
      return r.json();
    }));
    const nodeById = new Map();
    const chapters = [];
    const rawEdges = [];
    files.forEach((d) => {
      chapters.push({ chapter: d.chapter, title: d.title || d.chapter });
      (d.nodes || []).forEach((n) => { if (!nodeById.has(n.id)) nodeById.set(n.id, n); });
      (d.edges || []).forEach((e, i) => { e._id = `${d.chapter}:${i}`; rawEdges.push(e); });
    });
    // Keep only edges whose endpoints we actually loaded.
    const edges = rawEdges.filter((e) => nodeById.has(e.source) && nodeById.has(e.target));
    const dropped = rawEdges.length - edges.length;
    if (dropped) console.warn(`${dropped} edge(s) skipped — endpoint not among loaded chapters.`);
    return { nodes: [...nodeById.values()], edges, chapters };
  }

  function start(GRAPH) {
    "use strict";
    const nodes = GRAPH.nodes.map((n) => Object.assign({}, n));
    const links = GRAPH.edges.map((e) => Object.assign({}, e));
    const chapters = GRAPH.chapters || [];
    const nodeById = new Map(nodes.map((n) => [n.id, n]));
    const chapterTitle = new Map(chapters.map((c) => [c.chapter, c.title]));

    const adj = new Map(nodes.map((n) => [n.id, []]));
    links.forEach((e) => {
      adj.get(e.source).push({ edge: e, other: e.target, dir: "out" });
      adj.get(e.target).push({ edge: e, other: e.source, dir: "in" });
    });
    const degree = new Map(nodes.map((n) => [n.id, adj.get(n.id).length]));
    const rScale = d3.scaleSqrt().domain([1, d3.max([...degree.values()]) || 1]).range([4, 16]);

    let depth = 2;
    let selectedId = null;

    function neighbourhood(rootId, maxDepth) {
      const info = new Map([[rootId, { depth: 0, via: null }]]);
      let frontier = [rootId];
      for (let d = 1; d <= maxDepth && frontier.length; d++) {
        const next = [];
        for (const id of frontier) {
          for (const a of adj.get(id)) {
            if (!info.has(a.other)) {
              info.set(a.other, { depth: d, via: { from: id, edge: a.edge, dir: a.dir } });
              next.push(a.other);
            }
          }
        }
        frontier = next;
      }
      return info;
    }
    function depthColor(d) {
      if (d === 0) return "#e63946";
      const t = depth > 1 ? (d - 1) / (depth - 1) : 0;
      return d3.interpolateRgb("#f4a261", "#94a3b8")(t);
    }

    const svg = d3.select("#graph-svg");
    const pane = document.getElementById("graph-pane");
    const gZoom = svg.append("g");
    const gLinks = gZoom.append("g");
    const gNodes = gZoom.append("g");
    const zoom = d3.zoom().scaleExtent([0.15, 5]).on("zoom", (ev) => gZoom.attr("transform", ev.transform));
    svg.call(zoom);

    const sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id((d) => d.id).distance(60).strength(0.4))
      .force("charge", d3.forceManyBody().strength(-130))
      .force("center", d3.forceCenter(0, 0))
      .force("collide", d3.forceCollide().radius((d) => rScale(degree.get(d.id)) + 4))
      .on("tick", ticked);

    const linkSel = gLinks.selectAll("line").data(links).join("line")
      .attr("class", "link").attr("stroke-width", (d) => 0.5 + (d.weight || 1) * 0.35);

    const nodeSel = gNodes.selectAll("g.node").data(nodes).join("g").attr("class", "node")
      .call(d3.drag()
        .on("start", (ev, d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
        .on("end", (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
      .on("click", (ev, d) => { ev.stopPropagation(); selectNode(d.id); });
    nodeSel.append("circle").attr("r", (d) => rScale(degree.get(d.id))).attr("fill", "#6b7689");
    nodeSel.append("text").attr("x", (d) => rScale(degree.get(d.id)) + 3).attr("dy", "0.32em").text((d) => d.label);

    svg.on("click", () => selectNode(null));

    function ticked() {
      linkSel.attr("x1", (d) => d.source.x).attr("y1", (d) => d.source.y)
        .attr("x2", (d) => d.target.x).attr("y2", (d) => d.target.y);
      nodeSel.attr("transform", (d) => `translate(${d.x},${d.y})`);
    }

    function applyHighlight() {
      if (selectedId == null) {
        nodeSel.select("circle").attr("fill", "#6b7689").attr("opacity", 1).classed("focus", false);
        nodeSel.select("text").attr("opacity", 0.55);
        linkSel.attr("stroke", "#5b6577").attr("stroke-opacity", 0.3);
        return;
      }
      const info = neighbourhood(selectedId, depth);
      nodeSel.select("circle")
        .attr("fill", (d) => (info.has(d.id) ? depthColor(info.get(d.id).depth) : "#3a4150"))
        .attr("opacity", (d) => (info.has(d.id) ? 1 : 0.12))
        .classed("focus", (d) => d.id === selectedId);
      nodeSel.select("text").attr("opacity", (d) => (info.has(d.id) ? 1 : 0.05));
      linkSel
        .attr("stroke", (l) => (info.has(l.source.id) && info.has(l.target.id) ? "#f4a261" : "#5b6577"))
        .attr("stroke-opacity", (l) => (info.has(l.source.id) && info.has(l.target.id) ? 0.65 : 0.04));
    }

    function selectNode(id) {
      selectedId = id;
      applyHighlight();
      renderSidebar();
      if (id != null) centerOn(id);
    }
    function centerOn(id) {
      const n = nodeById.get(id);
      if (n == null || n.x == null) return;
      const w = pane.clientWidth, h = pane.clientHeight;
      const t = d3.zoomIdentity.translate(w / 2, h / 2).scale(1.1).translate(-n.x, -n.y);
      svg.transition().duration(500).call(zoom.transform, t);
    }
    function fitToView() {
      const xs = nodes.map((n) => n.x), ys = nodes.map((n) => n.y);
      const minX = d3.min(xs), maxX = d3.max(xs), minY = d3.min(ys), maxY = d3.max(ys);
      const w = pane.clientWidth, h = pane.clientHeight;
      const gw = maxX - minX || 1, gh = maxY - minY || 1;
      const scale = 0.85 * Math.min(w / gw, h / gh);
      const tx = w / 2 - scale * (minX + maxX) / 2, ty = h / 2 - scale * (minY + maxY) / 2;
      svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    }

    const body = document.getElementById("sidebar-body");
    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }
    function renderSidebar() {
      if (selectedId == null) { renderIntro(); return; }
      const node = nodeById.get(selectedId);
      const info = neighbourhood(selectedId, depth);
      const incident = adj.get(selectedId);
      const outgoing = incident.filter((a) => a.dir === "out");
      const incoming = incident.filter((a) => a.dir === "in");

      let html = `<div class="focus-head">
        <h2>${esc(node.label)}</h2>
        <div><span class="badge-type">${esc(node.type)}</span>
        <span class="badge-chapter">${esc(chapterTitle.get(node.chapter) || node.chapter)}</span></div>
        <p class="desc">${esc(node.description)}</p></div>`;
      html += `<div class="depth-group-title">Directly connected · ${incident.length}</div>`;
      if (outgoing.length) {
        html += `<div class="dir-label">${esc(node.label)} → …</div>`;
        outgoing.forEach((a) => { html += connCard(a.edge, a.other, "out"); });
      }
      if (incoming.length) {
        html += `<div class="dir-label">… → ${esc(node.label)}</div>`;
        incoming.forEach((a) => { html += connCard(a.edge, a.other, "in"); });
      }
      for (let d = 2; d <= depth; d++) {
        const ids = [...info.entries()].filter(([, v]) => v.depth === d).map(([id]) => id);
        if (!ids.length) continue;
        html += `<div class="depth-group-title">Depth ${d} · ${ids.length} node(s)</div>`;
        ids.sort((a, b) => nodeById.get(a).label.localeCompare(nodeById.get(b).label));
        ids.forEach((id) => {
          const via = info.get(id).via;
          html += `<div class="deep-item" data-id="${esc(id)}">
            <span class="via">${esc(via ? via.edge.relation : "")}</span>
            <span>${esc(nodeById.get(id).label)}</span></div>`;
        });
      }
      body.innerHTML = html;
      body.querySelectorAll("[data-id]").forEach((el) =>
        el.addEventListener("click", () => selectNode(el.getAttribute("data-id"))));
    }
    function connCard(edge, otherId, dir) {
      const other = nodeById.get(otherId);
      const arrow = dir === "out" ? "→" : "←";
      return `<div class="conn" data-id="${esc(otherId)}">
        ${edge.weight ? `<span class="wt">weight ${esc(edge.weight)}</span>` : ""}
        <div><span class="rel">${esc(edge.relation)}</span> <span class="arrow-i">${arrow}</span></div>
        <div class="target-label">${esc(other.label)} <span class="badge-type">${esc(other.type)}</span></div>
        <div class="edge-desc">${esc(edge.description)}</div>
        ${edge.evidence ? `<div class="evidence">“${esc(edge.evidence)}”</div>` : ""}</div>`;
    }
    function renderIntro() {
      body.innerHTML = `<div class="intro">
        <div class="stat-row">
          <div class="stat"><div class="n">${nodes.length}</div><div class="l">nodes</div></div>
          <div class="stat"><div class="n">${links.length}</div><div class="l">edges</div></div>
          <div class="stat"><div class="n">${chapters.length}</div><div class="l">chapters</div></div>
        </div>
        <p>This is the knowledge graph of the Popol Vuh — its deities, heroes, places,
        events, objects and themes, and the relationships the text draws between them.</p>
        <ul>
          <li><strong>Click any node</strong> to focus it. Its neighbourhood is highlighted
          in the graph and explained here; the rest is dimmed for context.</li>
          <li><strong>Traversal depth</strong> sets how many hops out from the focus are
          revealed (1 = direct neighbours, up to 4).</li>
          <li><strong>Search</strong> above to jump straight to a node.</li>
          <li>Drag to reposition · scroll to zoom · drag the background to pan.</li>
        </ul></div>`;
    }

    const depthRange = document.getElementById("depth-range");
    const depthVal = document.getElementById("depth-val");
    depthRange.addEventListener("input", () => {
      depth = +depthRange.value; depthVal.textContent = depth;
      applyHighlight(); renderSidebar();
    });
    document.getElementById("btn-reset").addEventListener("click", (e) => { e.stopPropagation(); selectNode(null); });
    document.getElementById("btn-zoom-fit").addEventListener("click", (e) => { e.stopPropagation(); fitToView(); });

    const search = document.getElementById("search");
    const results = document.getElementById("search-results");
    search.addEventListener("input", () => {
      const q = search.value.trim().toLowerCase();
      if (!q) { results.style.display = "none"; results.innerHTML = ""; return; }
      const matches = nodes.filter((n) => n.label.toLowerCase().includes(q) || n.id.includes(q)).slice(0, 12);
      if (!matches.length) { results.style.display = "none"; return; }
      results.innerHTML = matches.map((n) =>
        `<div class="res" data-id="${esc(n.id)}">${esc(n.label)} <small>· ${esc(n.type)}</small></div>`).join("");
      results.style.display = "block";
      results.querySelectorAll(".res").forEach((el) =>
        el.addEventListener("click", () => {
          selectNode(el.getAttribute("data-id")); search.value = ""; results.style.display = "none";
        }));
    });

    renderIntro();
    sim.alpha(1).restart();
    let warm = 0;
    const warmer = setInterval(() => { if (++warm > 60) { clearInterval(warmer); fitToView(); } }, 16);
  }

  loadGraph().then(start).catch((err) => {
    document.getElementById("sidebar-body").innerHTML =
      `<p style="color:#e63946">Failed to load graph data: ${err.message}.<br><br>
      Serve this folder over HTTP (e.g. <code>python3 -m http.server</code>) — opening the
      file directly blocks fetch in most browsers.</p>`;
  });
  </script>
</body>
</html>
